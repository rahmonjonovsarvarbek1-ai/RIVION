<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIVION | Kirish va Ro'yxatdan o'tish</title>

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='xGrad' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%23ffffff;stop-opacity:1' /%3E%3Cstop offset='100%25' style='stop-color:%23007bff;stop-opacity:1' /%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='20' fill='%230f0f0f'/%3E%3Cpath d='M25 20 H55 C72 20 80 30 80 42 C80 54 72 64 55 64 H40 L75 85 H58 L25 64 V20 Z M40 33 V51 H55 C63 51 66 47 66 42 C66 37 63 33 55 33 H40 Z' fill='url(%23xGrad)'/%3E%3Cpath d='M40 33 V51 H43 V33 H40 Z' fill='white' opacity='0.3'/%3E%3C/svg%3E">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper main-landing">
        <nav>
            <div class="logo">RIVION</div>
        </nav>

        <main class="auth-container">
            <div class="brand-section">
                <h1>Welcome to <span>RIVION</span></h1>
                <p id="modalSub">Davom etish uchun ma'lumotlarni kiriting.</p>
            </div>

            <div class="auth-card">
                <h2 id="modalTitle">Kirish</h2>
                
                <div class="auth-providers">
    <button class="provider-btn google" id="googleBtn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G">
        Google orqali davom etish
    </button>

    <button class="provider-btn apple" id="appleBtn">
        <svg viewBox="0 0 384 512" width="18" height="18" xmlns="http://www.w3.org/2000/svg">
            <path fill="currentColor" d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 21.8-88.5 21.8-11.4 0-51.1-20.8-83.6-20.1-42.9.6-82.7 24.5-104.6 62.7-45.3 79-11.6 190.3 33.4 254.4 21.3 30.7 48.2 65.2 81.3 64 31.3-1.1 43.1-20.5 81.8-20.5 38.2 0 49.3 20.5 82.3 19.9 33.6-.6 56.7-31.2 77.3-60.8 24.7-35.5 34.9-69.4 35.1-71.1-1-.2-67.2-25.3-67.4-101zM233 105c15.8-19.1 26.1-45.7 23.2-72.3-22.9 1.1-50.3 15.5-67 35.8-15.1 18-28.2 45.2-24.6 71.9 25.1 2.1 50.8-15 68.4-35.4z"/>
        </svg>
        Apple orqali davom etish
    </button>
              </div>

                <div class="divider">yoki</div>

                <div class="email-auth">
                    <input type="text" id="authName" placeholder="To'liq ismingiz" class="auth-input" style="display: none;">
                    <input type="email" id="authEmail" placeholder="Gmail yoki iCloud manzilingiz" class="auth-input">
                    <input type="password" id="authPassword" placeholder="Parolingiz" class="auth-input">
                    
                    <button class="btn-main full-width" id="mainAuthBtn">Kirish</button>
                    
                    <div class="toggle-container">
                        <span id="toggleText">Hisobingiz yo'qmi?</span> 
                        <a href="#" id="toggleAuth">Ro'yxatdan o'tish</a>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
